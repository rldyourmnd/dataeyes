name: gitleaks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install gitleaks
        run: |
          VERSION=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      # Scan the checked-out working tree (filesystem mode). This avoids the
      # gitleaks-action commit-range scan, which fails on the repo's first push
      # because the root commit has no parent revision to diff against.
      - name: Scan working tree for secrets
        run: gitleaks dir . --redact --verbose
